  <title>Page Not Found | Upstate Basketball League</title>
  <script>
    (() => {
      const base = document.createElement("base");
      const firstPathSegment = location.pathname.split("/").filter(Boolean)[0];
      base.href = location.hostname.endsWith(".github.io") && firstPathSegment
        ? `/${firstPathSegment}/`
        : "/";
      document.head.append(base);
    })();
  </script>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/icons/favicon-64.png">

</head>

        <img src="assets/optimized/ubl-logo-192.webp" alt="" width="192" height="295">
        <span><strong>Upstate</strong> Basketball League</span>
      </a>
    </div>
  </header>
  <main class="subpage-main" id="main">
    <section class="page-banner">
