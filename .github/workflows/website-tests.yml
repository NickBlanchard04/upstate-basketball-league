name: Website tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Unit tests
        run: npm run test:unit
      - name: Browser tests
        run: npm run test:e2e
      - name: Build allowlisted release
        run: npm run build:release
      - name: Validate release
        run: npm run validate:release
      - name: Enforce performance budgets
        shell: bash
        run: |
          python3 -m http.server 4175 --directory dist >/tmp/ubl-release-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4175/index.html >/dev/null; then
              break
            fi
            sleep 0.5
          done
          curl --fail --silent http://127.0.0.1:4175/index.html >/dev/null
          npm run audit:performance -- --base-url=http://127.0.0.1:4175 --runs=1
