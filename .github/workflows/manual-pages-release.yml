name: Manual UBL Pages release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ubl-github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Unit tests
        run: npm run test:unit
      - name: Browser tests
        run: npm run test:e2e
      - name: Build allowlisted release
        run: npm run build:release
      - name: Validate release
        run: npm run validate:release
      - name: Enforce performance budgets
        shell: bash
        run: |
          python3 -m http.server 4175 --directory dist >/tmp/ubl-release-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4175/index.html >/dev/null; then
              break
            fi
            sleep 0.5
          done
          curl --fail --silent http://127.0.0.1:4175/index.html >/dev/null
          npm run audit:performance -- --base-url=http://127.0.0.1:4175 --runs=1
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload release artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
